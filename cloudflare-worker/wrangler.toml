name = "ogretmen-yardimci-r2"
main = "worker.js"
compatibility_date = "2024-01-01"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "ogretmen-yardimci"

# Secrets (set via: wrangler secret put SECRET_NAME)
# R2_ACCOUNT_ID
# R2_ACCESS_KEY_ID
# R2_SECRET_ACCESS_KEY
# R2_PUBLIC_URL (e.g. https://pub-xxxxx.r2.dev)
# R2_BUCKET_NAME (optional, defaults to "ogretmen-yardimci")
